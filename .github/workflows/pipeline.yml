name: Java Backend CI

on:
  push:
    branches: [ "main" ] # Se déclenche à chaque push sur main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # On utilise une machine virtuelle Linux gratuite de GitHub

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compiler l'application
        run: javac Hello.java && jar cvf app.jar Hello.class

      - name: Vérifier Docker
        run: docker build -t mon-app-java:${{ github.sha }} .

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mon-app-java:latest