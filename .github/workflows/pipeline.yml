# Test de mise à jour
name: Java Backend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Étape de test (Optionnelle mais recommandée pour le "Fail Fast")
      - name: Run Tests with Maven
        run: mvn test 

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # On utilise l'image générée par le Dockerfile qui contient le build Maven
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mon-app-java:latest